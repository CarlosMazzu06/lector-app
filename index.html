<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lector Infinity</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>

<body>

<div id="uploadScreen" class="screen active">
    <h1>Lector Infinity</h1>
    <p>Leer y escuchar libros fácilmente</p>

    <label for="fileInput" class="uploadBtn">
        CARGAR LIBRO
    </label>

    <input type="file" id="fileInput" accept=".pdf,.epub" hidden>
</div>

<div id="readerScreen" class="screen">

    <div id="reader"></div>

    <div id="floatingMenu">

        <button onclick="toggleVoice()">🔊</button>
        <button onclick="summarizeText()">🧠</button>
        <button onclick="highlightText()">🖍️</button>
        <button onclick="increaseFont()">A+</button>
        <button onclick="decreaseFont()">A-</button>
        <button onclick="toggleTheme()">🌙</button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
