<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector Premium</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div id="uploadScreen" class="screen active">
    <div class="upload-box">
        <h1>Lector Premium</h1>
        <p>Leer y escuchar libros fácilmente</p>

        <label for="fileInput" class="upload-btn">
            Cargar Libro
        </label>

        <input type="file" id="fileInput" accept=".pdf,.epub" hidden>
        <p id="status"></p>
    </div>
</div>

<div id="readerScreen" class="screen">

    <div id="readerContainer">
        <div id="reader"></div>
    </div>

    <div class="bottomDock">

        <button onclick="prevPage()">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Anterior</span>
        </button>

        <button onclick="nextPage()">
            <i class="fa-solid fa-arrow-right"></i>
            <span>Siguiente</span>
        </button>

        <button onclick="zoomOut()">
            <i class="fa-solid fa-minus"></i>
            <span>Zoom -</span>
        </button>

        <button onclick="zoomIn()">
            <i class="fa-solid fa-plus"></i>
            <span>Zoom +</span>
        </button>

        <button onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i>
            <span>Modo</span>
        </button>

        <button onclick="playAudio()">
            <i class="fa-solid fa-volume-high"></i>
            <span>Escuchar</span>
        </button>

        <button onclick="stopAudio()">
            <i class="fa-solid fa-stop"></i>
            <span>Detener</span>
        </button>

        <button onclick="summarizeText()">
            <i class="fa-solid fa-brain"></i>
            <span>Resumen</span>
        </button>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
