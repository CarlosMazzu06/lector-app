<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector Inmersivo</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>

<body>

<div id="pantalla-carga" class="pantalla activa">

    <label for="fileInput" class="boton-gigante">
        CARGAR LIBRO
    </label>

    <input
        type="file"
        id="fileInput"
        accept=".pdf,.epub"
        hidden
    >

    <p id="mensaje-estado"></p>

</div>


<div id="pantalla-lectura" class="pantalla">

    <div id="reader" contenteditable="true"></div>

    <div class="controles">

        <button onclick="paginaAnterior()">◀</button>
        <button onclick="paginaSiguiente()">▶</button>

        <button onclick="zoomOut()">A-</button>
        <button onclick="zoomIn()">A+</button>

        <button onclick="resaltarPrincipal()">🟡</button>
        <button onclick="resaltarSecundario()">🔵</button>

        <button onclick="playAudio()">🔊</button>
        <button onclick="stopAudio()">⏹</button>

        <button onclick="resumirTexto()">🧠</button>

    </div>

</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
